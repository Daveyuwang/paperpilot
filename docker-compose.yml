x-backend-env: &backend-env
  env_file:
    - path: .env
      required: false
  environment:
    - POSTGRES_USER=${POSTGRES_USER:-paperpilot}
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-paperpilot}
    - POSTGRES_DB=${POSTGRES_DB:-paperpilot}

networks:
  paperpilot_net:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  model_cache:       # shared HuggingFace cache between backend & worker
  upload_data:
  langfuse_data:

services:
  # ── Infrastructure ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    <<: *backend-env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks: [paperpilot_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-paperpilot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks: [paperpilot_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse:
    image: langfuse/langfuse:latest
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=langfuse-secret-change-me
      - NEXTAUTH_URL=http://localhost:3100
      - SALT=langfuse-salt-change-me
      - TELEMETRY_ENABLED=false
    ports:
      - "3100:3000"
    networks: [paperpilot_net]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks: [paperpilot_net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    networks: [paperpilot_net]
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/localhost/6333' 2>/dev/null && exit 0 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # ── Application ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    <<: *backend-env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/app:/app/app
      - upload_data:/app/uploads
      - model_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    networks: [paperpilot_net]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    <<: *backend-env
    command: celery -A app.ingestion.celery_app worker --loglevel=info --concurrency=2 -Q ingestion,default
    volumes:
      - ./backend/app:/app/app
      - upload_data:/app/uploads
      - model_cache:/root/.cache/huggingface
    networks: [paperpilot_net]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    ports:
      - "5173:5173"
    networks: [paperpilot_net]
    environment:
      - VITE_API_URL=
      - VITE_WS_URL=
      - BACKEND_URL=http://backend:8000
      - BACKEND_WS_URL=ws://backend:8000
