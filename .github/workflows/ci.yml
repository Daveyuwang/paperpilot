name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        env:
          VITE_API_URL: http://localhost:8000
          VITE_WS_URL: ws://localhost:8000
        run: npm run build

  backend-smoke:
    name: Backend Smoke
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/backend
      ANTHROPIC_API_KEY: test-key
      DATABASE_URL: postgresql://paperpilot:paperpilot@localhost:5432/paperpilot
      DATABASE_URL_SYNC: postgresql://paperpilot:paperpilot@localhost:5432/paperpilot
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      QDRANT_URL: https://example.qdrant.io:6333
      QDRANT_API_KEY: test-key
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Smoke import FastAPI app
        run: python -c "from app.main import app; print(app.title)"

      - name: Smoke import Qdrant client config
        run: python -c "from app.retrieval.qdrant_client import get_client; print(type(get_client()).__name__)"

      - name: Run backend unit tests
        run: pytest backend/app/tests/test_health.py backend/tests/test_intent.py -q
